<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WhatsApp device linking — demo</title>
<style>
:root{ --wa-green:#25D366; --ink:#111827; --muted:#6B7280; --line:#E5E7EB; --card:#FFFFFF; --bg:#F7F7F8; }
html,body{height:100%}
body{ margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji"; background: transparent; display:flex; align-items:stretch; justify-content:center; height:100%; color:var(--ink); }
.wa-demo{ width:100%; background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow: 0 10px 25px rgba(17,24,39,.06); overflow:hidden; }
.wa-header{ display:flex; gap:12px; align-items:center; padding:16px 18px; border-bottom:1px solid var(--line); }
.wa-dot{ width:10px;height:10px;border-radius:999px;background:var(--wa-green); box-shadow:0 0 0 4px rgba(37,211,102,.18); }
.wa-title{ font-weight:700; letter-spacing:.2px; font-size:15px; }
.wa-sub{ margin-left:auto; font-size:13px; color:var(--muted); white-space:nowrap; }
.wa-stage{ padding:14px 16px 16px; }
.caption{ display:flex; gap:10px; align-items:flex-start; margin-top:10px; color:var(--muted); font-size:13px; line-height:1.5; }
.badge{ flex:0 0 auto; width:26px;height:26px;border-radius:8px; background:rgba(37,211,102,.12); display:flex;align-items:center;justify-content:center; color:var(--wa-green); font-weight:800; font-size:13px; }
@media (max-width:520px){
  .wa-header{padding:14px 14px}
  .wa-stage{padding:12px 12px 14px}
  .wa-sub{font-size:12px}
  .caption{font-size:12px}
}
@media (prefers-reduced-motion: reduce){ .anim { animation: none !important; } }
</style>

<script>
  // i18n for embedded demo (follows parent by query param: ?lang=...)
  const params = new URLSearchParams(location.search);
  const raw = (params.get('lang') || (navigator.language || 'en')).toLowerCase();
  function pickLang(raw){
    const supported = new Set(['en','zh','zh-tw','ja','ko','fr','de','es','pt-br','ru','ar','hi','id','th','vi']);
    if (supported.has(raw)) return raw;
    if (raw.startsWith('zh-tw') || raw.startsWith('zh-hant') || raw.startsWith('zh-hk')) return 'zh-tw';
    if (raw.startsWith('zh')) return 'zh';
    if (raw.startsWith('pt-br')) return 'pt-br';
    const base = raw.split('-')[0];
    return supported.has(base) ? base : 'en';
  }
  const lang = pickLang(raw);

  const t = dict[lang] || dict.en;
  const htmlLang = {
    'en':'en','zh':'zh-CN','zh-tw':'zh-TW','ja':'ja','ko':'ko','fr':'fr','de':'de','es':'es','pt-br':'pt-BR',
    'ru':'ru','ar':'ar','hi':'hi','id':'id','th':'th','vi':'vi'
  };
  document.documentElement.lang = htmlLang[lang] || 'en';
  if (lang === 'ar') document.documentElement.dir = 'rtl';
  const demo = document.querySelector('.wa-demo');
  if (demo) demo.setAttribute('aria-label', t.aria);

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!key) return;
    // caption contains markup, so use innerHTML
    el.innerHTML = t[key] ?? el.innerHTML;
  });

  document.querySelectorAll('[data-i18n-svg]').forEach(el => {
    const key = el.getAttribute('data-i18n-svg');
    if (!key) return;
    el.textContent = t[key] ?? el.textContent;
  });
</script>
