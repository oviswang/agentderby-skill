<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문의 — BOTHook</title>
  <meta name="description" content="BOTHook 지원 문의." />
  <link rel="icon" href="/assets/logo.jpg" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="canonical" href="https://bothook.me/ko/contact.html" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17978535664"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-17978535664');
  </script>
</head>
<body>
  <header class="header">
    <a class="brand" href="/ko/" aria-label="BOTHook home">
      <img src="/assets/logo.jpg" alt="BOTHook logo" />
      <strong>BOTHook</strong>
    </a>
  </header>

  <main class="main">
    <div class="content-wrap" id="contentWrap">
      <section class="card" style="max-width:760px; margin:0 auto;">
        <h1 class="h1" style="font-size:32px; margin-bottom:8px;">문의</h1>
        <p class="p">메시지를 보내주시면 이메일로 답변드립니다.</p>

        <div id="sent" class="card" style="display:none; background:rgba(90,255,209,.10);">
          <strong>접수되었습니다. 감사합니다.</strong>
          <div class="p" style="margin-top:8px;">가능한 빨리 이메일로 답변드리겠습니다.</div>
        </div>

        <form id="form" class="card" style="margin-top:14px;" autocomplete="on">
          <label class="label" for="email">이메일</label>
          <input id="email" name="email" type="email" required placeholder="you@company.com" class="input" />

          <div style="height:12px"></div>
          <label class="label" for="wa">WhatsApp 번호(확인용)</label>
          <input id="wa" name="wa" type="tel" placeholder="필수: WhatsApp 전화번호(예: +82 10-1234-5678)" class="input" />

          <div style="height:12px"></div>



          <label class="label" for="uuid">UUID / 전달 링크(조회용)</label>
          <input id="uuid" name="uuid" type="text" placeholder="필수: UUID 또는 https://p.bothook.me/..." class="input" />

          <div style="height:12px"></div>

          <label class="label" for="message">메시지</label>
          <textarea id="message" name="message" rows="6" required placeholder="무엇을 도와드릴까요?" class="input"></textarea>

          <div class="btns">
            <button class="cta primary" type="submit">보내기</button>
            <a class="cta ghost" href="/ko/">뒤로</a>
          </div>
          <p class="hint" style="margin-top:10px;">팁: WhatsApp 연결(QR 스캔) 관련 문의라면 UUID를 함께 적어주시면 더 빠르게 확인할 수 있습니다.</p>
        </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footerRow">
      <div>© <span id="year"></span> BOTHook.</div>
      <nav class="footerLinks" aria-label="Footer">
        <a href="/ko/contact.html">문의</a>
        <span class="dot">·</span>
        <a href="/ko/terms.html">약관</a>
        <span class="dot">·</span>
        <a href="/ko/privacy.html">개인정보</a>
      </nav>
    </div>
  </footer>

  <script>
    const wrap = document.getElementById('contentWrap');
    wrap.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => wrap.style.opacity = '1'));

    document.getElementById('year').textContent = new Date().getFullYear();

    // Prefill UUID from querystring (e.g. /contact.html?uuid=...)
    const params = new URLSearchParams(location.search);
    const uuid = params.get('uuid');
    if (uuid) document.getElementById('uuid').value = uuid;

    const form = document.getElementById('form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        email: form.email.value,
        wa: form.wa.value,
        uuid: form.uuid.value,
        message: form.message.value,
        pageLang: document.documentElement.lang || 'ko',
      };

      try {
        const r = await fetch('/api/support/ticket', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => null);
        if (!r.ok || !j || !j.ok) throw new Error(j?.error || 'Failed');

        const sent = document.getElementById('sent');
        sent.style.display = 'block';
        sent.innerHTML = `<strong>접수되었습니다. 감사합니다.</strong><div class="p" style="margin-top:8px;">Ticket: <strong>${j.ticket_id}</strong>. 가능한 빨리 이메일로 답변드리겠습니다.</div>`;
        form.style.display = 'none';
        sent.scrollIntoView({behavior:'smooth', block:'start'});
      } catch (err) {
        alert('Could not submit. Please try again in a moment.');
      }
    });
  </script>

  <style>
    .input{width:100%;border:0;border-radius:14px;padding:12px 12px;background:rgba(255,255,255,.06);color:var(--text);outline:none}
    .input::placeholder{color:rgba(169,182,214,.7)}
    textarea.input{resize:vertical;min-height:120px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  </style>
</body>
</html>
