<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>संपर्क — BOTHook</title>
  <meta name="description" content="BOTHook सपोर्ट से संपर्क करें।" />
  <link rel="icon" href="/assets/logo.jpg" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="canonical" href="https://bothook.me/hi/contact.html" />
  <link rel="alternate" hreflang="en" href="https://bothook.me/contact.html" />
  <link rel="alternate" hreflang="hi" href="https://bothook.me/hi/contact.html" />
</head>
<body>
  <header class="header">
    <a class="brand" href="/hi/" aria-label="BOTHook होम">
      <img src="/assets/logo.jpg" alt="BOTHook logo" />
      <strong>BOTHook</strong>
    </a>
  </header>

  <main class="main">
    <div class="content-wrap" id="contentWrap">
      <section class="card" style="max-width:760px; margin:0 auto;">
        <h1 class="h1" style="font-size:32px; margin-bottom:8px;">संपर्क</h1>
        <p class="p">हमें संदेश भेजें — हम ईमेल से जवाब देंगे।</p>

        <div id="sent" class="card" style="display:none; background:rgba(90,255,209,.10);">
          <strong>धन्यवाद — मिल गया।</strong>
          <div class="p" style="margin-top:8px;">हम जल्द से जल्द आपके ईमेल पर जवाब देंगे।</div>
        </div>

        <form id="form" class="card" style="margin-top:14px;" autocomplete="on">
          <label class="label" for="email">ईमेल</label>
          <input id="email" name="email" type="email" required placeholder="you@company.com" class="input" />

          <div style="height:12px"></div>
          <label class="label" for="wa">WhatsApp phone (for verification)</label>
          <input id="wa" name="wa" type="tel" placeholder="Required for account actions. Example: +65 8123 4567" class="input" />

          <div style="height:12px"></div>



          <label class="label" for="uuid">UUID / Delivery link (for lookup)</label>
          <input id="uuid" name="uuid" type="text" placeholder="Required for account actions. UUID or https://p.bothook.me/..." class="input" />

          <div style="height:12px"></div>

          <label class="label" for="message">संदेश</label>
          <textarea id="message" name="message" rows="6" required placeholder="हम कैसे मदद कर सकते हैं?" class="input"></textarea>

          <div class="btns">
            <button class="cta primary" type="submit">भेजें</button>
            <a class="cta ghost" href="/hi/">वापस</a>
          </div>
          <p class="hint" style="margin-top:10px;">टिप: अगर आप WhatsApp linking (provisioning) कर रहे हैं, तो अपना UUID शामिल करें ताकि हम आपकी session जल्दी ढूंढ सकें।</p>
        </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footerRow">
      <div>© <span id="year"></span> BOTHook.</div>
      <nav class="footerLinks" aria-label="Footer">
        <a href="/hi/contact.html">संपर्क</a>
        <span class="dot">·</span>
        <a href="/hi/terms.html">शर्तें</a>
        <span class="dot">·</span>
        <a href="/hi/privacy.html">गोपनीयता</a>
      </nav>
    </div>
  </footer>

  <script>
    const wrap = document.getElementById('contentWrap');
    wrap.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => wrap.style.opacity = '1'));

    document.getElementById('year').textContent = new Date().getFullYear();

    const params = new URLSearchParams(location.search);
    const uuid = params.get('uuid');
    if (uuid) document.getElementById('uuid').value = uuid;

    const form = document.getElementById('form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        email: form.email.value,
        wa: form.wa.value,
        uuid: form.uuid.value,
        message: form.message.value,
        pageLang: document.documentElement.lang || 'hi',
      };

      try {
        const r = await fetch('/api/support/ticket', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => null);
        if (!r.ok || !j || !j.ok) throw new Error(j?.error || 'Failed');

        const sent = document.getElementById('sent');
        sent.style.display = 'block';
        sent.innerHTML = `<strong>धन्यवाद — मिल गया।</strong><div class="p" style="margin-top:8px;">Ticket: <strong>${j.ticket_id}</strong>. हम जल्द से जल्द आपके ईमेल पर जवाब देंगे।</div>`;
        form.style.display = 'none';
        sent.scrollIntoView({behavior:'smooth', block:'start'});
      } catch (err) {
        alert('सबमिट नहीं हो सका। कृपया थोड़ी देर बाद फिर कोशिश करें।');
      }
    });
  </script>

  <style>
    .input{width:100%;border:0;border-radius:14px;padding:12px 12px;background:rgba(255,255,255,.06);color:var(--text);outline:none}
    .input::placeholder{color:rgba(169,182,214,.7)}
    textarea.input{resize:vertical;min-height:120px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  </style>
</body>
</html>
