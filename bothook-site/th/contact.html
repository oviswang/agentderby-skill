<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ติดต่อ — BOTHook</title>
  <meta name="description" content="ติดต่อฝ่ายซัพพอร์ตของ BOTHook" />
  <link rel="icon" href="/assets/logo.jpg" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="canonical" href="https://bothook.me/th/contact.html" />
  <link rel="alternate" hreflang="en" href="https://bothook.me/contact.html" />
  <link rel="alternate" hreflang="th" href="https://bothook.me/th/contact.html" />
</head>
<body>
  <header class="header">
    <a class="brand" href="/th/" aria-label="หน้าแรก BOTHook">
      <img src="/assets/logo.jpg" alt="BOTHook logo" />
      <strong>BOTHook</strong>
    </a>
  </header>

  <main class="main">
    <div class="content-wrap" id="contentWrap">
      <section class="card" style="max-width:760px; margin:0 auto;">
        <h1 class="h1" style="font-size:32px; margin-bottom:8px;">ติดต่อ</h1>
        <p class="p">ส่งข้อความถึงเรา แล้วเราจะตอบกลับทางอีเมล</p>

        <div id="sent" class="card" style="display:none; background:rgba(90,255,209,.10);">
          <strong>ขอบคุณ — เราได้รับแล้ว</strong>
          <div class="p" style="margin-top:8px;">เราจะตอบกลับทางอีเมลให้เร็วที่สุด</div>
        </div>

        <form id="form" class="card" style="margin-top:14px;" autocomplete="on">
          <label class="label" for="email">อีเมล</label>
          <input id="email" name="email" type="email" required placeholder="you@company.com" class="input" />

          <div style="height:12px"></div>

          <label class="label" for="uuid">Provisioning UUID (ไม่บังคับ)</label>
          <input id="uuid" name="uuid" type="text" placeholder="จาก p.bothook.me" class="input" />

          <div style="height:12px"></div>

          <label class="label" for="message">ข้อความ</label>
          <textarea id="message" name="message" rows="6" required placeholder="เราช่วยอะไรได้บ้าง?" class="input"></textarea>

          <div class="btns">
            <button class="cta primary" type="submit">ส่ง</button>
            <a class="cta ghost" href="/th/">กลับ</a>
          </div>
          <p class="hint" style="margin-top:10px;">คำแนะนำ: หากคุณกำลังทำ WhatsApp linking (provisioning) ให้ใส่ UUID เพื่อให้เราหาเซสชันของคุณได้เร็วขึ้น</p>
        </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footerRow">
      <div>© <span id="year"></span> BOTHook.</div>
      <nav class="footerLinks" aria-label="Footer">
        <a href="/th/contact.html">ติดต่อ</a>
        <span class="dot">·</span>
        <a href="/th/terms.html">ข้อกำหนด</a>
        <span class="dot">·</span>
        <a href="/th/privacy.html">ความเป็นส่วนตัว</a>
      </nav>
    </div>
  </footer>

  <script>
    const wrap = document.getElementById('contentWrap');
    wrap.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => wrap.style.opacity = '1'));

    document.getElementById('year').textContent = new Date().getFullYear();

    const params = new URLSearchParams(location.search);
    const uuid = params.get('uuid');
    if (uuid) document.getElementById('uuid').value = uuid;

    const form = document.getElementById('form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        email: form.email.value,
        uuid: form.uuid.value,
        message: form.message.value,
        pageLang: document.documentElement.lang || 'th',
      };

      try {
        const r = await fetch('/api/support/ticket', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const j = await r.json().catch(() => null);
        if (!r.ok || !j || !j.ok) throw new Error(j?.error || 'ล้มเหลว');

        const sent = document.getElementById('sent');
        sent.style.display = 'block';
        sent.innerHTML = `<strong>ขอบคุณ — เราได้รับแล้ว</strong><div class="p" style="margin-top:8px;">Ticket: <strong>${j.ticket_id}</strong>. เราจะตอบกลับทางอีเมลให้เร็วที่สุด</div>`;
        form.style.display = 'none';
        sent.scrollIntoView({behavior:'smooth', block:'start'});
      } catch (err) {
        alert('ส่งไม่สำเร็จ กรุณาลองใหม่อีกครั้งในอีกสักครู่');
      }
    });
  </script>

  <style>
    .input{width:100%;border:0;border-radius:14px;padding:12px 12px;background:rgba(255,255,255,.06);color:var(--text);outline:none}
    .input::placeholder{color:rgba(169,182,214,.7)}
    textarea.input{resize:vertical;min-height:120px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  </style>
</body>
</html>
