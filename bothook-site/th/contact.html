<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — BOTHook</title>
  <meta name="description" content="Contact BOTHook." />
  <link rel="icon" href="/assets/logo.jpg" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="canonical" href="https://bothook.me/th/contact.html" />
</head>
<body>
  <header class="header">
    <a class="brand" href="/th/" aria-label="BOTHook home">
      <img src="/assets/logo.jpg" alt="BOTHook logo" />
      <strong>BOTHook</strong>
    </a>
  </header>

  <main class="main">
    <div class="content-wrap" id="contentWrap">
      <section class="card" style="max-width:860px;margin:0 auto;">
        <h1 class="h1" style="font-size:32px;">ติดต่อ</h1>
        

        <p class="p">ส่งข้อความถึงเรา แล้วเราจะตอบกลับทางอีเมล</p>



        <hr class="hr" />
        <form class="form" id="contactForm" style="margin-top:16px;">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" name="email" type="email" required placeholder="you@example.com" />

          <label class="label" for="uuid" style="margin-top:12px;">Provisioning UUID (optional)</label>
          <input class="input" id="uuid" name="uuid" type="text" placeholder="e.g. 7c2f..." />
          <p class="p" style="font-size:13px;opacity:.85;">Tip: If you’re provisioning WhatsApp linking, include your UUID so we can find your session quickly.</p>

          <label class="label" for="message" style="margin-top:12px;">Message</label>
          <textarea class="textarea" id="message" name="message" required rows="7" placeholder="How can we help?"></textarea>

          <button class="btn" type="submit" style="margin-top:14px;">Send</button>
          <p class="p" id="ok" style="display:none;margin-top:10px;">Thanks — we got it. We’ll reply to your email as soon as possible.</p>
        </form>
        <script>
          const form = document.getElementById('contactForm');
          const ok = document.getElementById('ok');
          form.addEventListener('submit', async (e) => {
            e.preventDefault();
            ok.style.display = 'none';
            const data = {
              email: form.email.value.trim(),
              uuid: form.uuid.value.trim(),
              message: form.message.value.trim(),
            };
            const res = await fetch('/api/support/contact', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(data),
            });
            if (res.ok) {
              ok.style.display = 'block';
              form.reset();
            } else {
              alert('Failed. Please try again later.');
            }
          });
        </script>
        
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a class="footer-link" href="/th/">Home</a>
      <a class="footer-link" href="/th/terms.html">Terms</a>
      <a class="footer-link" href="/th/privacy.html">Privacy</a>
      <a class="footer-link" href="/th/contact.html">Contact</a>
    </div>
  </footer>
  
</body>
</html>
